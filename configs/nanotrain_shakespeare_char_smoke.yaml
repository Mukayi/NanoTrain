seed: 1337

model:
  vocab_size: 50304
  block_size: 32
  n_layer: 2
  n_head: 2
  n_embd: 128
  dropout: 0.0
  bias: false

data:
  dataset: shakespeare_char
  data_dir: nanoGPT/data/shakespeare_char
  batch_size: 4

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.99
  grad_clip: 1.0

scheduler:
  decay_lr: true
  warmup_iters: 2
  lr_decay_iters: 20
  min_lr: 0.0001

train:
  max_iters: 20
  eval_interval: 10
  eval_iters: 5
  log_interval: 1
  gradient_accumulation_steps: 1
  out_dir: out/nanotrain-shakespeare-char-smoke
  always_save_checkpoint: false

distributed:
  backend: nccl
  tp_size: 1
  zero_stage: 0

runtime:
  device: cpu
  dtype: float32
  compile: false
  amp: false
  activation_checkpointing: false

