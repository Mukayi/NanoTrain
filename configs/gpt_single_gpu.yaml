# Minimal single-GPU GPT training config for the NanoTrain runtime.
# Phase 1 will migrate nanoGPT's Python config style into this YAML schema.

seed: 1337

model:
  vocab_size: 50304
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0
  bias: false

data:
  dataset: shakespeare_char
  data_dir: nanoGPT/data/shakespeare_char
  batch_size: 64

optimizer:
  name: adamw
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

scheduler:
  decay_lr: true
  warmup_iters: 100
  lr_decay_iters: 5000
  min_lr: 0.00006

train:
  max_iters: 5000
  eval_interval: 500
  eval_iters: 100
  log_interval: 10
  gradient_accumulation_steps: 1
  out_dir: out-shakespeare-char

distributed:
  backend: nccl
  tp_size: 1
  zero_stage: 0

runtime:
  device: cuda
  dtype: bfloat16
  compile: false
  amp: true
  activation_checkpointing: false

